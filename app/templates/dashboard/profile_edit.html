{% extends "base.html" %}

{% block title %}编辑个人资料 - {{ current_user.username }}{% endblock %}

{% block content %}
<section class="page-section">
    <div class="dashboard-shell">
        {% include "dashboard/_sidebar.html" %}

        <section class="content-panel">
            <div class="section-heading section-heading--compact">
                <div>
                    <p class="eyebrow">Profile</p>
                    <h1>完善作者信息</h1>
                </div>
            </div>

            <div id="profile-update-error" class="form-message error d-none"></div>
            <div id="profile-update-success" class="form-message success d-none"></div>

            <form id="profile-edit-form" class="editor-form">
                <div class="form-grid form-grid--double">
                    <label class="field">
                        <span class="field__label">用户名</span>
                        <input type="text" class="form-control" id="editUsername" value="{{ current_user.username }}" required>
                    </label>
                    <label class="field">
                        <span class="field__label">邮箱</span>
                        <input type="email" class="form-control" id="editEmail" value="{{ current_user.email }}" required>
                    </label>
                </div>

                <div class="form-grid form-grid--double">
                    <label class="field">
                        <span class="field__label">公开显示名称</span>
                        <input type="text" class="form-control" id="editFullName" value="{{ current_user.full_name or '' }}">
                    </label>
                    <label class="field">
                        <span class="field__label">所在地区</span>
                        <input type="text" class="form-control" id="editLocation" value="{{ current_user.location or '' }}">
                    </label>
                </div>

                <div class="form-grid form-grid--double">
                    <label class="field">
                        <span class="field__label">头像 URL</span>
                        <input type="url" class="form-control" id="editAvatarUrl" value="{{ current_user.avatar_url or '' }}">
                    </label>
                    <label class="field">
                        <span class="field__label">个人网站</span>
                        <input type="url" class="form-control" id="editWebsite" value="{{ current_user.website or '' }}">
                    </label>
                </div>

                <label class="field">
                    <span class="field__label">个人简介</span>
                    <textarea class="form-control" id="editBio" rows="5" placeholder="介绍一下你关注的领域、写作方向和你希望读者从这里获得什么">{{ current_user.bio or '' }}</textarea>
                </label>

                <section class="sub-panel">
                    <h2 class="sub-panel__title">修改密码</h2>
                    <div class="form-grid form-grid--double">
                        <label class="field">
                            <span class="field__label">新密码</span>
                            <input type="password" class="form-control" id="editPassword" placeholder="留空则不修改">
                        </label>
                        <label class="field">
                            <span class="field__label">确认新密码</span>
                            <input type="password" class="form-control" id="editConfirmPassword" placeholder="再次输入新密码">
                        </label>
                    </div>
                </section>

                <div class="editor-actions">
                    <a href="{{ url_for('user_profile_page') }}" class="btn btn-ghost">取消</a>
                    <button type="submit" class="btn btn-primary">保存更改</button>
                </div>
            </form>
        </section>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script src="{{ static_asset(request, 'js/dashboard.js') }}"></script>
{% endblock %}
